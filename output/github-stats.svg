<svg xmlns="http://www.w3.org/2000/svg" width="495" height="210" viewBox="0 0 495 210" role="img" aria-label="GitHub stats summary for ochtum">
  <defs>
    <linearGradient id="stats-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0D1233" />
      <stop offset="100%" stop-color="#100B2F" />
    </linearGradient>
    <style>
      .title { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #F43F93; }
      .label { font: 700 12px 'Segoe UI', Arial, sans-serif; fill: #67E8F9; }
      .value { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #A7F3D0; }
      .icon { font: 700 13px 'Segoe UI Symbol', 'Segoe UI', Arial, sans-serif; fill: #FACC15; }
      .grade { font: 700 46px 'Segoe UI', Arial, sans-serif; fill: #67E8F9; }
      .score { font: 600 11px 'Segoe UI', Arial, sans-serif; fill: #94A3B8; }
    </style>
  </defs>
  <rect x="0" y="0" width="495" height="210" rx="8" fill="url(#stats-bg)" />
  <rect x="1" y="1" width="493" height="208" rx="7" fill="none" stroke="#334155" />
  <text x="24" y="36" class="title">ochtum&apos;s GitHub Stats</text>
  <text x="24" y="63" class="icon">☆</text>
  <text x="42" y="63" class="label">Total Stars Earned:</text>
  <text x="284" y="63" class="value" text-anchor="end">15</text>
  <text x="24" y="91" class="icon">◔</text>
  <text x="42" y="91" class="label">Total Commits (last year):</text>
  <text x="284" y="91" class="value" text-anchor="end">160</text>
  <text x="24" y="119" class="icon">⑂</text>
  <text x="42" y="119" class="label">Total PRs:</text>
  <text x="284" y="119" class="value" text-anchor="end">5</text>
  <text x="24" y="147" class="icon">◍</text>
  <text x="42" y="147" class="label">Total Issues:</text>
  <text x="284" y="147" class="value" text-anchor="end">1</text>
  <text x="24" y="175" class="icon">▣</text>
  <text x="42" y="175" class="label">Contributed to (last year):</text>
  <text x="284" y="175" class="value" text-anchor="end">14</text>
  <circle cx="414" cy="103" r="34" fill="none" stroke="#312E81" stroke-width="7" />
  <path d="M 414 69 A 34 34 0 1 1 411.87 136.93" fill="none" stroke="#EC4899" stroke-width="7" stroke-linecap="round" />
  <text x="414" y="116" class="grade" text-anchor="middle">D</text>
  <text x="414" y="136" class="score" text-anchor="middle">score 51</text>
</svg>

