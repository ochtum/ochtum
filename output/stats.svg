<svg xmlns="http://www.w3.org/2000/svg" width="495" height="210" viewBox="0 0 495 210" role="img" aria-label="GitHub profile stats">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <style>
      .title { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .login { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #93C5FD; }
      .item { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #E2E8F0; }
      .meta { font: 500 12px 'Segoe UI', Arial, sans-serif; fill: #94A3B8; }
    </style>
  </defs>
  <rect x="0" y="0" width="495" height="210" rx="18" fill="url(#bg)" />
  <rect x="1" y="1" width="493" height="208" rx="17" fill="none" stroke="#1E293B" />
  <text x="24" y="40" class="title">Ochtum</text>
  <text x="24" y="60" class="login">@ochtum</text>
  <text x="24" y="95" class="item">• 125 Contributions this year</text>
  <text x="24" y="120" class="item">• 20 Public repositories</text>
  <text x="24" y="145" class="item">• 22 Followers</text>
  <text x="24" y="170" class="item">• Joined GitHub 2022-12-27</text>
  <text x="24" y="194" class="meta">Updated 2026-03-05 15:51 UTC</text>
</svg>

