<svg xmlns="http://www.w3.org/2000/svg" width="495" height="228" viewBox="0 0 495 228" role="img" aria-label="Repository card for linkwarden/linkwarden">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#1F2937" />
      <stop offset="100%" stop-color="#1B2534" />
    </linearGradient>
    <style>
      .title { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #809EC5; }
      .desc { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #BBBFC5; }
      .traffic-label { font: 600 9px 'Segoe UI', Arial, sans-serif; fill: #BBBFC5; }
      .traffic-value { font: 700 17px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .meta { font: 600 12px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .fork-icon { font: 700 14px 'Segoe UI Symbol', 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .sub { font: 500 11px 'Segoe UI', Arial, sans-serif; fill: #9CA1A9; }
      .badge-text { font: 700 9px 'Segoe UI', Arial, sans-serif; text-anchor: middle; }
      .hint { font: 500 10px 'Segoe UI', Arial, sans-serif; fill: #798089; }
      .traffic-panel { fill: #37404E; fill-opacity: 0.55; stroke: #6E89AB; stroke-opacity: 0.65; }
      .traffic-sep { stroke: #3C4C62; stroke-opacity: 0.45; }
      .icon-frame { fill: #F8FAFC; stroke: #6E89AB; stroke-width: 1.4; }
      .icon-image-bg { fill: #343E4C; }
      .icon-shape { fill: none; stroke: #637287; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }
      .icon-dot { fill: #0F172A; }
    </style>
    <clipPath id="iconClip">
      <rect x="4" y="4" width="20" height="20" rx="4" />
    </clipPath>
  </defs>
  <rect x="0" y="0" width="495" height="228" rx="8" fill="url(#bg)" />
  <rect x="1" y="1" width="493" height="226" rx="7" fill="none" stroke="#566C88" />
  <g transform="translate(24 18)">
    <rect x="0" y="0" width="28" height="28" rx="7" class="icon-frame" />
    <path d="M6 10h6l2.2 3H22v9H6z" class="icon-shape" />
    <path d="M6 13h16" class="icon-shape" />
    <circle cx="20" cy="8" r="2" class="icon-dot" />
  </g>
  <text x="62" y="40" class="title">linkwarden</text>
  <text x="24" y="70" class="desc">⚡️⚡️⚡️ Self-hosted collaborative bookmark manager to c</text>
  <text x="24" y="87" class="desc">ollect, read, annotate, and fully preserve what matter</text>
  <text x="24" y="104" class="desc">s, all in one place.</text>
