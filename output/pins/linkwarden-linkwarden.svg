  <text x="40" y="166" class="meta">TypeScript</text>
  <text x="220" y="166" class="meta">★ 18,102</text>
  <text x="300" y="166" class="meta"><tspan class="fork-icon">⑂</tspan> 733</text>
  <text x="24" y="184" class="sub">linkwarden/linkwarden</text>
  <rect x="413" y="173" width="58" height="15" rx="7" fill="#F8FAFC" stroke="#0F172A" />
  <text x="442" y="183" class="badge-text" fill="#0F172A">PUBLIC</text>
