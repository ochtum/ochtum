<svg xmlns="http://www.w3.org/2000/svg" width="495" height="228" viewBox="0 0 495 228" role="img" aria-label="Repository card for Coggle/coggle-translations">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#0B1120" />
    </linearGradient>
    <style>
      .title { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #60A5FA; }
      .desc { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #22D3EE; }
      .traffic-label { font: 600 9px 'Segoe UI', Arial, sans-serif; fill: #93C5FD; }
      .traffic-value { font: 700 17px 'Segoe UI', Arial, sans-serif; fill: #E2E8F0; }
      .meta { font: 600 12px 'Segoe UI', Arial, sans-serif; fill: #E2E8F0; }
      .fork-icon { font: 700 14px 'Segoe UI Symbol', 'Segoe UI', Arial, sans-serif; fill: #E2E8F0; }
      .sub { font: 500 11px 'Segoe UI', Arial, sans-serif; fill: #94A3B8; }
      .badge-text { font: 700 9px 'Segoe UI', Arial, sans-serif; text-anchor: middle; }
      .hint { font: 500 10px 'Segoe UI', Arial, sans-serif; fill: #64748B; }
      .traffic-panel { fill: #0A1E3A; fill-opacity: 0.55; stroke: #1D4ED8; stroke-opacity: 0.65; }
      .traffic-sep { stroke: #1D4ED8; stroke-opacity: 0.45; }
      .icon-frame { fill: #F8FAFC; stroke: #3B82F6; stroke-width: 1.4; }
      .icon-image-bg { fill: #0B1224; }
      .icon-shape { fill: none; stroke: #0F172A; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }
      .icon-dot { fill: #0F172A; }
    </style>
    <clipPath id="iconClip">
      <rect x="4" y="4" width="20" height="20" rx="4" />
    </clipPath>
  </defs>
  <rect x="0" y="0" width="495" height="228" rx="8" fill="url(#bg)" />
  <rect x="1" y="1" width="493" height="226" rx="7" fill="none" stroke="#334155" />
  <g transform="translate(24 18)">
    <rect x="0" y="0" width="28" height="28" rx="7" class="icon-frame" />
    <path d="M6 10h6l2.2 3H22v9H6z" class="icon-shape" />
    <path d="M6 13h16" class="icon-shape" />
    <circle cx="20" cy="8" r="2" class="icon-dot" />
  </g>
  <text x="62" y="40" class="title">coggle-translations</text>
  <text x="24" y="70" class="desc">Help translate Coggle into your native language!</text>
  <circle cx="28" cy="162" r="5" fill="#ffcc33" />
  <text x="40" y="166" class="meta">Fluent</text>
  <text x="220" y="166" class="meta">★ 56</text>
  <text x="300" y="166" class="meta"><tspan class="fork-icon">⑂</tspan> 68</text>
  <text x="24" y="184" class="sub">Coggle/coggle-translations</text>
  <rect x="413" y="173" width="58" height="15" rx="7" fill="#0F766E" stroke="#F8FAFC" />
  <text x="442" y="183" class="badge-text" fill="#CCFBF1">PUBLIC</text>
</svg>

