name: notify-my-blazor-project

on:
  push:
    branches:
      - main
    paths:
      - README.md
      - output/pins/*.svg
      - output/pins/**/*.svg
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest

    steps:
      - name: Dispatch sync event to portfolio repository
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PORTFOLIO_REPO_DISPATCH_TOKEN }}
          repository: ochtum/my-blazor-project
          event-type: sync-myprojects
          client-payload: >-
            {"source_repo":"ochtum/ochtum","source_ref":"${{ github.ref }}","source_sha":"${{ github.sha }}"}
